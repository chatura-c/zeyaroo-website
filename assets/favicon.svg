<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32" role="img" aria-label="zeyaroo">
  <title>zeyaroo</title>
  <style>
    .frame      { fill: #F7F5F0; stroke: #1C1C1A; }
    .frame-gold { fill: #C5A059; stroke: #1C1C1A; }
    @media (prefers-color-scheme: dark) {
      .frame      { fill: #1C1C1A; stroke: #F7F5F0; }
      .frame-gold { fill: #C5A059; stroke: #C5A059; }
    }
  </style>
  <g stroke-width="3.2" stroke-linejoin="round">
    <rect class="frame"      x="8"  y="9"  width="44" height="13" rx="2.5" transform="rotate(-4 30 15.5)"/>
    <rect class="frame"      x="14" y="25" width="36" height="14" rx="2.5" transform="rotate(-48 32 32)"/>
    <rect class="frame-gold" x="12" y="42" width="44" height="13" rx="2.5" transform="rotate(4 34 48.5)"/>
  </g>
</svg>
