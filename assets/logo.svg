<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="zeyaroo">
  <title>zeyaroo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@600&amp;display=swap');
    .wm { font-family: 'Familjen Grotesk', 'Inter', system-ui, -apple-system, sans-serif;
          font-weight: 600; font-size: 48px; letter-spacing: -2px; }
  </style>
  <!-- Mark -->
  <g transform="translate(8 8) scale(1)" stroke="#1C1C1A" stroke-width="2.2" stroke-linejoin="round">
    <rect x="8"  y="9"  width="44" height="13" rx="2.5" fill="#F7F5F0" transform="rotate(-4 30 15.5)"/>
    <rect x="14" y="25" width="36" height="14" rx="2.5" fill="#F7F5F0" transform="rotate(-48 32 32)"/>
    <rect x="12" y="42" width="44" height="13" rx="2.5" fill="#C5A059" transform="rotate(4 34 48.5)"/>
  </g>
  <!-- Wordmark -->
  <text class="wm" x="84" y="56" fill="#1C1C1A">
    <tspan fill="#C5A059">z</tspan>eyaroo
  </text>
